services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lumi
      POSTGRES_USER: lumi
      POSTGRES_PASSWORD: lumipass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumi"]
      interval: 5s
      timeout: 5s
      retries: 10

  dashboard:
    image: ${IMAGE:-ghcr.io/nguyenkien0703/tracking-token-lumi-dashboard}:${IMAGE_TAG:-latest}
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - API_BASE_URL=${API_BASE_URL}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DATABASE_URL=postgresql://lumi:lumipass@postgres:5432/lumi
      - ADMIN_PANEL_PASSWORD=${ADMIN_PANEL_PASSWORD}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - SESSION_SECRET=${SESSION_SECRET}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}

volumes:
  postgres_data:
