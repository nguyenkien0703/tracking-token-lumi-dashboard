name: Deploy Staging

on:
  push:
    branches: ['staging']
  workflow_dispatch:

env:
  IMAGE: ghcr.io/nguyenkien0703/tracking-token-lumi-dashboard

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:staging,${{ env.IMAGE }}:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          envs: GITHUB_TOKEN,GHCR_ACTOR
          script_stop: true
          script: |
            set -euo pipefail
            mkdir -p /root/monitor/lumi-dashboard/staging
            cd /root/monitor/lumi-dashboard/staging
            if [ ! -d .git ]; then
              git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/nguyenkien0703/tracking-token-lumi-dashboard.git" .
              git checkout staging
            else
              git fetch origin staging
              git checkout staging
              git reset --hard origin/staging
            fi
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GHCR_ACTOR}" --password-stdin
            export IMAGE_TAG=staging
            make staging
            docker image prune -f
