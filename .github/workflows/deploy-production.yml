name: Deploy Production

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  IMAGE: ghcr.io/nguyenkien0703/tracking-token-lumi-dashboard

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF##refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=manual-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.tag }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          envs: GITHUB_TOKEN,GHCR_ACTOR,IMAGE_TAG
          script_stop: true
          script: |
            set -euo pipefail
            mkdir -p /root/monitor/tracking-token-lumi-dashboard
            cd /root/monitor/tracking-token-lumi-dashboard
            if [ ! -d .git ]; then
              git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/nguyenkien0703/tracking-token-lumi-dashboard.git" .
            fi
            git fetch --tags origin
            git checkout "${IMAGE_TAG}" || git checkout main
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GHCR_ACTOR}" --password-stdin
            export IMAGE_TAG
            make production
            docker image prune -f
